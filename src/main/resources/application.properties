spring.application.name=dream-diary
spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app.sqlite.db-path=${SQLITE_DB_PATH:./data/dream-diary.db}

spring.datasource.url=jdbc:sqlite:${app.sqlite.db-path}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
spring.jackson.time-zone=UTC

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.security.api-key=${DREAM_DIARY_API_KEY}
app.security.oauth.username=${DREAM_DIARY_OAUTH_USERNAME:}
app.security.oauth.password=${DREAM_DIARY_OAUTH_PASSWORD:}
app.security.oauth.client-id=${DREAM_DIARY_OAUTH_CLIENT_ID:}
app.security.oauth.client-secret=${DREAM_DIARY_OAUTH_CLIENT_SECRET:}
app.security.oauth.redirect-uris=${DREAM_DIARY_OAUTH_REDIRECT_URIS:https://claude.ai/api/mcp/auth_callback}
app.security.oauth.issuer-url=${DREAM_DIARY_OAUTH_ISSUER_URL:${app.openapi.server-url}}
app.security.oauth.scopes=${DREAM_DIARY_OAUTH_SCOPES:dreamdiary.read dreamdiary.write}
app.security.oauth.token-ttl=${DREAM_DIARY_OAUTH_TOKEN_TTL:PT8H}
app.security.oauth.refresh-token-ttl=${DREAM_DIARY_OAUTH_REFRESH_TOKEN_TTL:P30D}
app.security.oauth.authorization-code-ttl=${DREAM_DIARY_OAUTH_AUTH_CODE_TTL:PT5M}

app.openapi.server-url=${OPENAPI_SERVER_URL:https://your-domain.example.com}

logging.level.com.example.dreamdiary=INFO
logging.level.org.springframework.security=INFO
