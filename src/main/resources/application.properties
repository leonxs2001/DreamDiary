spring.application.name=dream-diary
spring.config.import=optional:file:.env[.properties]

app.sqlite.db-path=${SQLITE_DB_PATH:./data/dream-diary.db}

spring.datasource.url=jdbc:sqlite:${app.sqlite.db-path}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
spring.jackson.time-zone=UTC

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

app.security.users=${DREAM_DIARY_USERS:alice:secret123}
app.security.oauth.client-id=${OAUTH_CLIENT_ID:dream-diary-gpt-client}
app.security.oauth.client-secret=${OAUTH_CLIENT_SECRET:change-me-please}
app.security.oauth.redirect-uri=${OAUTH_REDIRECT_URI:https://chat.openai.com/aip/oauth/callback}
app.security.oauth.scopes=${OAUTH_SCOPES:openid,profile,dream.read,dream.write}
app.security.oauth.issuer=${OAUTH_ISSUER:http://localhost:8080}

app.openapi.server-url=${OPENAPI_SERVER_URL:https://your-domain.example.com}
app.openapi.authorization-url=${OPENAPI_AUTHORIZATION_URL:${app.openapi.server-url}/oauth2/authorize}
app.openapi.token-url=${OPENAPI_TOKEN_URL:${app.openapi.server-url}/oauth2/token}

logging.level.com.example.dreamdiary=INFO
logging.level.org.springframework.security=INFO
