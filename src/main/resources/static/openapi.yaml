openapi: 3.1.1
info:
  title: Dream Diary API + MCP
  version: 1.2.0
  description: REST API and MCP endpoint for creating and managing dream entries with OAuth2 and legacy API key auth.
servers:
  - url: https://example.de
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: Legacy static bearer API key from `DREAM_DIARY_API_KEY`.
    oauth2:
      type: oauth2
      description: OAuth 2.0 Authorization Code with PKCE for Claude custom connectors.
      flows:
        authorizationCode:
          authorizationUrl: /oauth/authorize
          tokenUrl: /oauth/token
          scopes:
            dreamdiary.read: Read dream entries
            dreamdiary.write: Create, update and delete dream entries
  schemas:
    CreateDreamEntryRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          example: Ich bin durch einen hellen Wald geflogen.
        dreamDate:
          type: string
          format: date
          description: Optional dream date. If omitted, the API uses the current timestamp.
          example: 2026-03-23
    UpdateDreamEntryTextRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          example: Danach wurde der Himmel golden.
    DreamEntryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        text:
          type: string
          example: Ich stand am Meer und sah zwei Monde.
        createdAt:
          type: string
          format: date-time
          example: 2026-03-23T07:45:30Z
        updatedAt:
          type: string
          format: date-time
          nullable: true
          example: 2026-03-23T08:01:05Z
    PagedDreamEntryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DreamEntryResponse'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 3
        last:
          type: boolean
          example: false
    OAuthTokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 28800
        refresh_token:
          type: string
        scope:
          type: string
          example: dreamdiary.read dreamdiary.write
    OAuthTokenError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: invalid_grant
        error_description:
          type: string
          example: Invalid PKCE code_verifier.
    OAuthProtectedResourceMetadata:
      type: object
      properties:
        resource:
          type: string
          example: https://example.de/mcp
        authorization_servers:
          type: array
          items:
            type: string
            example: https://example.de
        bearer_methods_supported:
          type: array
          items:
            type: string
            example: header
        scopes_supported:
          type: array
          items:
            type: string
            example: dreamdiary.read
    OAuthAuthorizationServerMetadata:
      type: object
      properties:
        issuer:
          type: string
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        scopes_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
    McpJsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          enum: [ "2.0" ]
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        method:
          type: string
          example: tools/call
        params:
          type: object
          additionalProperties: true
    McpJsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: [ "2.0" ]
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
    ApiError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2026-03-23T10:15:30Z
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Query parameter 'day' cannot be combined with 'start' or 'end'.
        path:
          type: string
          example: /api/dream-entries
        validationErrors:
          type: object
          additionalProperties:
            type: string
security:
  - bearerAuth: [ ]
  - oauth2: [ dreamdiary.read, dreamdiary.write ]
paths:
  /.well-known/oauth-protected-resource:
    get:
      operationId: oauthProtectedResourceMetadata
      summary: RFC 9728 protected resource metadata
      responses:
        '200':
          description: Metadata returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProtectedResourceMetadata'
  /.well-known/oauth-protected-resource/mcp:
    get:
      operationId: oauthProtectedResourceMetadataMcp
      summary: RFC 9728 protected resource metadata for /mcp
      responses:
        '200':
          description: Metadata returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthProtectedResourceMetadata'
  /.well-known/oauth-authorization-server:
    get:
      operationId: oauthAuthorizationServerMetadata
      summary: RFC 8414 authorization server metadata
      responses:
        '200':
          description: Metadata returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorizationServerMetadata'
  /.well-known/oauth-authorization-server/mcp:
    get:
      operationId: oauthAuthorizationServerMetadataMcp
      summary: RFC 8414 authorization server metadata for /mcp
      responses:
        '200':
          description: Metadata returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthAuthorizationServerMetadata'
  /oauth/authorize:
    get:
      operationId: oauthAuthorizeScreen
      summary: OAuth authorization endpoint (Authorization Code + PKCE)
      parameters:
        - in: query
          name: response_type
          required: true
          schema:
            type: string
            enum: [ code ]
        - in: query
          name: client_id
          required: true
          schema:
            type: string
        - in: query
          name: redirect_uri
          required: true
          schema:
            type: string
            format: uri
        - in: query
          name: scope
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
        - in: query
          name: code_challenge
          required: true
          schema:
            type: string
        - in: query
          name: code_challenge_method
          required: true
          schema:
            type: string
            enum: [ S256 ]
        - in: query
          name: resource
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Login form
        '400':
          description: Invalid request
    post:
      operationId: oauthAuthorizeSubmit
      summary: Submit OAuth login form and issue authorization code
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - response_type
                - client_id
                - redirect_uri
                - code_challenge
                - code_challenge_method
                - username
                - password
              properties:
                response_type:
                  type: string
                  enum: [ code ]
                client_id:
                  type: string
                redirect_uri:
                  type: string
                scope:
                  type: string
                state:
                  type: string
                code_challenge:
                  type: string
                code_challenge_method:
                  type: string
                  enum: [ S256 ]
                resource:
                  type: string
                username:
                  type: string
                password:
                  type: string
      responses:
        '302':
          description: Redirect to client redirect_uri with authorization code
        '200':
          description: Login form re-rendered (e.g. invalid credentials)
        '400':
          description: Invalid request
  /oauth/token:
    post:
      operationId: issueOauthToken
      summary: OAuth token endpoint
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
              properties:
                grant_type:
                  type: string
                  enum: [ authorization_code, refresh_token, password ]
                code:
                  type: string
                redirect_uri:
                  type: string
                code_verifier:
                  type: string
                refresh_token:
                  type: string
                client_id:
                  type: string
                client_secret:
                  type: string
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
        '400':
          description: OAuth error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenError'
        '401':
          description: OAuth client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenError'
  /mcp:
    post:
      operationId: mcpJsonRpc
      summary: MCP JSON-RPC endpoint
      description: Handles MCP methods such as `initialize`, `tools/list` and `tools/call`.
      security:
        - bearerAuth: [ ]
        - oauth2: [ dreamdiary.read, dreamdiary.write ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpJsonRpcRequest'
            examples:
              toolsCall:
                summary: Call createDreamEntry MCP tool
                value:
                  jsonrpc: "2.0"
                  id: "1"
                  method: tools/call
                  params:
                    name: createDreamEntry
                    arguments:
                      text: Ich habe von einem leuchtenden Ozean getraeumt.
                      dreamDate: 2026-03-23
      responses:
        '200':
          description: JSON-RPC response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpJsonRpcResponse'
        '401':
          description: Unauthorized
          headers:
            WWW-Authenticate:
              schema:
                type: string
              description: Bearer challenge including resource_metadata for OAuth discovery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/dream-entries:
    post:
      operationId: createDreamEntry
      summary: Create a dream entry
      security:
        - bearerAuth: [ ]
        - oauth2: [ dreamdiary.write ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDreamEntryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DreamEntryResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      operationId: searchDreamEntries
      summary: Search dream entries
      description: If `day` is present, `start` and `end` are rejected with 400.
      security:
        - bearerAuth: [ ]
        - oauth2: [ dreamdiary.read ]
      parameters:
        - in: query
          name: day
          required: false
          schema:
            type: string
            format: date
          example: 2026-03-23
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
          example: 2026-03-23T00:00:00Z
        - in: query
          name: end
          required: false
          schema:
            type: string
            format: date-time
          example: 2026-03-24T00:00:00Z
        - in: query
          name: q
          required: false
          schema:
            type: string
          example: meer
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - in: query
          name: sort
          required: false
          schema:
            type: string
            default: createdAt,desc
      responses:
        '200':
          description: Search result page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedDreamEntryResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/dream-entries/{id}:
    get:
      operationId: getDreamEntryById
      summary: Get one dream entry
      security:
        - bearerAuth: [ ]
        - oauth2: [ dreamdiary.read ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Dream entry found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DreamEntryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Dream entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      operationId: deleteDreamEntry
      summary: Delete a dream entry
      security:
        - bearerAuth: [ ]
        - oauth2: [ dreamdiary.write ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Dream entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/dream-entries/{id}/text:
    patch:
      operationId: updateDreamEntryText
      summary: Update only the text field of a dream entry
      security:
        - bearerAuth: [ ]
        - oauth2: [ dreamdiary.write ]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDreamEntryTextRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DreamEntryResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Dream entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
