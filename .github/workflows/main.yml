name: Build and Commit JAR

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Java 21 installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Maven Build
        run: mvn clean package -DskipTests

      - name: JAR vorbereiten
        run: |
          mkdir -p build-output
          cp target/dream-diary-*.jar build-output/app.jar

      - name: Commit und Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add build-output/app.jar

          git commit -m "Update JAR [skip ci]" || echo "No changes to commit"

          git push
